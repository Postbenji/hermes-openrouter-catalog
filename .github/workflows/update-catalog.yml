name: Update OpenRouter Model Catalog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog
        run: python3 .github/scripts/generate_catalog.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add model-catalog.json
          git diff --staged --quiet || git commit -m "chore: update OpenRouter catalog $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push# workflow trigger
